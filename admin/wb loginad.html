<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập Quản trị viên</title>
  <link rel="stylesheet" href="../admincss/style loginad.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h2>Đăng nhập Quản trị viên</h2>
      <form onsubmit="return false;">
        <div class="input-group">
          <label>Tên đăng nhập</label>
          <input type="text" placeholder="Nhập tên admin" required>
        </div>

        <div class="input-group">
          <label>Mật khẩu</label>
          <input type="password" placeholder="Nhập mật khẩu" required>
        </div>

        <a href="wb mainad.html" class="login-btn">Đăng nhập</a>
      </form>
    </div>
  </div>
</body>
</html>
